# SASRec config for H&M dataset (RecBole)
# Dataset files should be placed under data/processed/

dataset: hm_seq
data_path: data/processed/
field_separator: "\t"
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp
ITEM_LIST_LENGTH_FIELD: item_length
LIST_SUFFIX: _list
seq_separator: " "

load_col:
  inter: [user_id, item_id_list, item_length, item_id, timestamp]

eval_args:
  order: TO
  group_by: user
  mode: full

benchmark_filename: [train, valid, test]

metrics: ['MAP', 'Recall', 'NDCG', 'MRR', 'Hit', 'Precision']
topk: [12]
valid_metric: NDCG@12

model: SASRec
hidden_size: 64
inner_size: 256
n_layers: 2
n_heads: 2
hidden_dropout_prob: 0.2
attn_dropout_prob: 0.2
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
MAX_ITEM_LIST_LENGTH: 50
loss_type: CE

epochs: 30
train_batch_size: 512
eval_batch_size: 512
learning_rate: 0.001
eval_step: 1
stopping_step: 5
train_neg_sample_args: null

gpu_id: '0'
checkpoint_dir: outputs/checkpoints/sasrec
log_wandb: False
